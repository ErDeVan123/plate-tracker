<!DOCTYPE html>
<html>
<head>
    <title>Plate Tracker 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; }
        
        /* THE MAP CONTAINER & LAYER DEFINITION */
        #map-container { width: 100%; height: 50vh; background: #252525; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #444; position: relative; overflow: scroll; }
        svg { width: 960px; height: 500px; max-width: 100%; transform-origin: top left; }
        
        /* STATE STYLING DEFINITIONS */
        .state-path { fill: #444444; stroke: #1a1a1a; stroke-width: 1.5; cursor: pointer; transition: fill 0.2s ease; }
        .state-path:hover, .state-path:active { fill: #666666; }
        .state-path.selected { fill: #3a5fcd; stroke: #ffffff; stroke-width: 2; }
        .state-path.found { fill: #2E7D32 !important; stroke: #4CAF50; }
        
        /* UI ELEMENT PANEL STYLING */
        #global-counter { position: sticky; top: 0; background: #2E7D32; text-align: center; padding: 10px; font-weight: bold; font-size: 1.1em; z-index: 10; border-bottom: 1px solid #1e5222; }
        #detail-screen { padding: 20px; display: none; background: #222; min-height: 50vh; padding-bottom: 60px; }
        .btn-confirm { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; font-size: 1.2em; border-radius: 8px; margin-bottom: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #333; padding: 12px; border-radius: 6px; font-size: 0.9em; border: 1px solid #444; }
        .tab-header { font-weight: bold; color: #4CAF50; margin-top: 20px; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 4px; font-size: 1.1em; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<!-- GLOBAL PROGRESS MONITOR -->
<div id="global-counter">States Spotted: <span id="counter-val">0</span> / 50</div>

<!-- 1. THE INTERACTIVE VECTOR MAP LAYER -->
<div id="map-container">
    <!-- Inline SVG definition mapping the US geographical grid layout coordinates -->
    <svg viewBox="0 0 960 500">
        <!-- Colorado Polygon Path Layout -->
        <path id="path-CO" class="state-path" onclick="selectStateFromMap('CO')" d="M371.3,184.2 L497.6,193.3 L489.1,273.6 L359.8,263.8 Z" />
        <!-- Texas Polygon Path Layout -->
        <path id="path-TX" class="state-path" onclick="selectStateFromMap('TX')" d="M366.5,274.6 L435.5,278.4 L440.1,328.3 L522.6,327.5 L552.4,395.7 L508.8,452.8 L482.4,451.3 L469.2,403.7 L413.4,411.3 L390.1,349.5 L346.8,338.4 L365.1,299.7 Z" />
        <!-- California Polygon Path Layout -->
        <path id="path-CA" class="state-path" onclick="selectStateFromMap('CA')" d="M141.2,120.4 L180.5,129.8 L152.4,263.5 L215.3,348.6 L188.5,366.4 L130.4,250.2 Z" />
        <!-- NOTE: The internal library layout scales up automatically inside this inline group block -->
    </svg>
</div>

<!-- 2. THE ALMANAC PROFILE MODULE VIEWPORTS -->
<div id="detail-screen">
    <button class="btn-confirm" id="confirmBtn" onclick="markAsFound()">Mark as Spotted</button>
    <h1 id="stateName" style="margin-top: 0; color: #4CAF50;">Select a State</h1>
    
    <div class="stat-grid">
        <div class="stat-box"><b>Capital:</b> <span id="capital">-</span></div>
        <div class="stat-box"><b>Est. Average Income:</b> <span id="avgIncome">-</span></div>
        <div class="stat-box"><b>Tax Bracket Architecture:</b> <span id="taxRate">-</span></div>
        <div class="stat-box"><b>Obesity Metrics:</b> <span id="obesity">-</span></div>
    </div>

    <div class="tab-header">JUSTICE, LEGISLATION & PENOLOGY</div>
    <div style="font-size: 0.95em; line-height: 1.4; background: #2a2a2a; padding: 12px; border-radius: 6px;">
        <p style="margin-top:0;"><b>Death Penalty Status:</b> <span id="deathPenalty">-</span></p>
        <p><b>Murder Rate Index:</b> <span id="murder">-</span></p>
        <p style="margin-bottom:0;"><b>Cannabis Statues:</b> <span id="marijuana">-</span></p>
    </div>

    <div class="tab-header">PROFESSIONAL SPORTS FRANCHISES</div>
    <ul id="sportsList" style="font-size:0.95em; padding-left:20px; line-height: 1.5;">
        <!-- Injected values -->
    </ul>
</div>

<!-- 3. DATA AND CONTROLLER ENGINE -->
<script>
const statesDatabase = {
    "CO": {
        name: "Colorado",
        capital: "Denver",
        obesity: "22.0% (Rank: 50th - Best in US)",
        avgIncome: "$82,254 (Rank: 11th)",
        taxRate: "4.40% (Flat Rate)",
        marijuanaStatus: "Legal (Recreational since 2012)",
        murderRate: "5.8 per 100k (Rank: 24th)",
        deathPenalty: "Abolished in 2020 (Last: Gary Lee Davis, 1997)",
        sports: ["NHL: Colorado Avalanche (3 titles)", "NBA: Denver Nuggets (1 title)", "NFL: Denver Broncos (3 titles)", "MLB: Colorado Rockies (0 titles)"]
    },
    "TX": {
        name: "Texas",
        capital: "Austin",
        obesity: "36.1% (Rank: 12th)",
        avgIncome: "$67,422 (Rank: 26th)",
        taxRate: "0.00% (No State Income Tax)",
        marijuanaStatus: "Illegal (Fully prohibited)",
        murderRate: "6.7 per 100k (Rank: 18th)",
        deathPenalty: "Active (175 men / 6 women on death row)",
        sports: ["NHL: Dallas Stars (1 title)", "NBA: Rockets (2), Spurs (5), Mavericks (1)", "NFL: Dallas Cowboys (5 titles)", "MLB: Astros (2), Rangers (1)"]
    },
    "CA": {
        name: "California",
        capital: "Sacramento",
        obesity: "28.1% (Rank: 44th)",
        avgIncome: "$91,551 (Rank: 5th)",
        taxRate: "1.0% - 13.3% (Graduated)",
        marijuanaStatus: "Legal (Recreational since 2016)",
        murderRate: "5.7 per 100k (Rank: 25th)",
        deathPenalty: "Active (Moratorium) - 656 total on death row",
        sports: ["NHL: Ducks (1), Kings (2)", "NBA: Lakers (17), Warriors (7), Kings (1)", "NFL: 49ers (5), Rams (2)", "MLB: Dodgers (7), Giants (8), Athletics (9), Angels (1)"]
    }
};

let currentState = "";
let foundStatesList = JSON.parse(localStorage.getItem('foundStatesList')) || [];

function initializeSavedStates() {
    // Flag discovered states as green on startup
    foundStatesList.forEach(stateCode => {
        const pathEl = document.getElementById(`path-${stateCode}`);
        if (pathEl) pathEl.classList.add('found');
    });
    updateGlobalCounterDisplay();
}

function selectStateFromMap(stateCode) {
    currentState = stateCode;
    const data = statesDatabase[stateCode];
    if (!data) return;

    // Reset visual selection states on map
    document.querySelectorAll('.state-path').forEach(el => el.classList.remove('selected'));
    
    const activePath = document.getElementById(`path-${stateCode}`);
    if (activePath) activePath.classList.add('selected');

    // Reveal output detail wrapper
    document.getElementById("detail-screen").style.display = "block";

    // Inject string sets
    document.getElementById("stateName").innerText = data.name;
    document.getElementById("capital").innerText = data.capital;
    document.getElementById("avgIncome").innerText = data.avgIncome;
    document.getElementById("taxRate").innerText = data.taxRate;
    document.getElementById("obesity").innerText = data.obesity;
    document.getElementById("deathPenalty").innerText = data.deathPenalty;
    document.getElementById("murder").innerText = data.murderRate;
    document.getElementById("marijuana").innerText = data.marijuanaStatus;

    const sportsUl = document.getElementById("sportsList");
    sportsUl.innerHTML = "";
    data.sports.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item;
        sportsUl.appendChild(li);
    });
    
    updateButtonUI();
    document.getElementById("detail-screen").scrollIntoView({ behavior: 'smooth' });
}

function markAsFound() {
    if (!currentState) return;
    
    if (!foundStatesList.includes(currentState)) {
        foundStatesList.push(currentState);
        localStorage.setItem('foundStatesList', JSON.stringify(foundStatesList));
        
        updateButtonUI();
        updateGlobalCounterDisplay();
        
        const pathEl = document.getElementById(`path-${currentState}`);
        if (pathEl) {
            pathEl.classList.remove('selected');
            pathEl.classList.add('found');
        }
    }
}

function updateButtonUI() {
    const btn = document.getElementById("confirmBtn");
    if (foundStatesList.includes(currentState)) {
        btn.innerText = "✅ SPOTTED IN THE WILD!";
        btn.style.background = "#2E7D32";
    } else {
        btn.innerText = "Mark as Spotted";
        btn.style.background = "#4CAF50";
    }
}

function updateGlobalCounterDisplay() {
    document.getElementById("counter-val").innerText = foundStatesList.length;
}

initializeSavedStates();
</script>
</body>
</html>
